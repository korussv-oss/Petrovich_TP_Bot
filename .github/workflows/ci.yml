name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Lint with ruff
  # Checks code style and common errors without running the bot.
  # Only ruff is installed — no heavy dependencies required.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

  # ---------------------------------------------------------------------------
  # Job 2: Unit tests with pytest
  # Tests in tests/ only use stdlib + core.support.ticket_wizard (no external deps).
  # Only pytest is installed — CI runs in ~5 seconds.
  # ---------------------------------------------------------------------------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pytest
        run: pip install pytest pytest-asyncio

      - name: Syntax check (py_compile)
        run: python -m compileall -q .

      - name: Run tests
        run: pytest tests/ -v --tb=short
