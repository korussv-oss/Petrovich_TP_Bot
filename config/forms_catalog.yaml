# Каталог форм поддержки (UI + Jira маппинг).
# Секреты и базовые параметры подключения остаются в .env (JIRA_LOGIN_URL, JIRA_TOKEN и т.д.).

pc_problem:
  label: "Проблема в работе ПК"
  project_key: "HD"
  portal_id: "1"
  jira:
    service_desk_id: "1"
    request_type_id: "377"
    reporter_profile_key: "jira_username"
    fields:
      customfield_11400:
        source: "form.pc_problem_kind_id"
        type: "option"
        required: true
      customfield_11406:
        source: "profile.department"
        type: "option"
        required: true
      customfield_13103:
        source: "profile.phone"
        type: "phone"
        required: true
      description:
        source: "form.description"
        type: "text"
        required: false
        default: "Описание не предоставлено"
        max_len: 4000
      attachment:
        source: "attachments"
        type: "attachment"
        required: false
  ui:
    selects:
      pc_problem_kind_id:
        options:
          - id: "11732"
            label: "Зависание"
          - id: "11733"
            label: "Не включается"
          - id: "11734"
            label: "Самопроизвольно выключается"
          - id: "11735"
            label: "Медленно работает"
          - id: "11736"
            label: "Не печатает"
          - id: "10803"
            label: "Не нашёл подходящую категорию"
          - id: "10800"
            label: "Другая проблема с ПК"

